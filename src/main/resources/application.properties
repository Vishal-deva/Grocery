spring.datasource.driver-class-name=org.postgresql.Driver

# ==============================
# HikariCP Connection Pool (recommended)
# ==============================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=HikariPool

# ==============================
# JPA / Hibernate Configuration
# ==============================
spring.jpa.show-sql=true
# Optional: logs SQL statements
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update
# 'update' for dev; use 'validate' for prod
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ==============================
# Server Port (Render uses environment variable PORT)
# ==============================
server.port=${PORT:8080}
# Use Render's PORT environment variable or fallback to 8080

# ==============================
# Optional: Connection Test
# ==============================
spring.datasource.test-on-borrow=true
spring.datasource.validation-query=SELECT 1